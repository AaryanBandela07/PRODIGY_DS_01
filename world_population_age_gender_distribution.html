<div style="display: flex; flex-direction: column; gap: 2rem;">

  <div>
    <div style="display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 12px; font-size: 12px; color: var(--color-text-secondary);">
      <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #1D9E75;"></span>Share of world population</span>
    </div>
    <div style="position: relative; width: 100%; height: 280px;">
      <canvas id="ageChart" role="img" aria-label="Histogram of world population by age group, 2024. Ages 0 to 14: 25 percent, about 2.0 billion people. Ages 15 to 64: 65 percent, about 5.3 billion people. Ages 65 and older: 10 percent, about 0.8 billion people.">Age distribution: 0-14 years 25%, 15-64 years 65%, 65+ years 10%.</canvas>
    </div>
  </div>

  <div>
    <div style="display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 12px; font-size: 12px; color: var(--color-text-secondary);">
      <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #378ADD;"></span>Male 50.2%</span>
      <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #D4537E;"></span>Female 49.8%</span>
    </div>
    <div style="position: relative; width: 100%; height: 240px;">
      <canvas id="genderChart" role="img" aria-label="Bar chart of world population by gender, 2024. Male: 50.2 percent, about 4.12 billion people. Female: 49.8 percent, about 4.08 billion people.">Gender distribution: Male 50.2%, Female 49.8%.</canvas>
    </div>
  </div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.08)';
  const tickColor = isDark ? '#B4B2A9' : '#5F5E5A';

  new Chart(document.getElementById('ageChart'), {
    type: 'bar',
    data: {
      labels: ['Ages 0–14', 'Ages 15–64', 'Ages 65+'],
      datasets: [{
        label: 'Share of population',
        data: [25, 65, 10],
        backgroundColor: '#1D9E75',
        borderRadius: 4,
        barPercentage: 0.6
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: (ctx) => {
              const pop = [2.05, 5.33, 0.82][ctx.dataIndex];
              return ctx.parsed.y + '% of world population (~' + pop + 'B people)';
            }
          }
        }
      },
      scales: {
        y: {
          beginAtZero: true,
          max: 70,
          ticks: { color: tickColor, callback: (v) => v + '%' },
          grid: { color: gridColor }
        },
        x: {
          ticks: { color: tickColor },
          grid: { display: false }
        }
      }
    }
  });

  new Chart(document.getElementById('genderChart'), {
    type: 'bar',
    data: {
      labels: ['Male', 'Female'],
      datasets: [{
        label: 'Share of population',
        data: [50.2, 49.8],
        backgroundColor: ['#378ADD', '#D4537E'],
        borderRadius: 4,
        barPercentage: 0.5
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: (ctx) => {
              const pop = ctx.dataIndex === 0 ? 4.12 : 4.08;
              return ctx.parsed.x + '% of world population (~' + pop + 'B people)';
            }
          }
        }
      },
      scales: {
        x: {
          beginAtZero: true,
          max: 60,
          ticks: { color: tickColor, callback: (v) => v + '%' },
          grid: { color: gridColor }
        },
        y: {
          ticks: { color: tickColor },
          grid: { display: false }
        }
      }
    }
  });
</script>
